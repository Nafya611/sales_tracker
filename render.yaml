databases:
  - name: sales-tracker-db
    databaseName: salesdb
    user: salesuser
    plan: free

services:
  - type: web
    name: sales-tracker-backend
    runtime: python
    rootDir: backend
    buildCommand: "bash build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --limit-request-field_size 16384 --limit-request-fields 200"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales-tracker-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
